name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm run build
        env:
          PUBLIC_GHL_FORM_URL: ${{ secrets.PUBLIC_GHL_FORM_URL }}
          PUBLIC_GHL_CALENDAR_URL: ${{ secrets.PUBLIC_GHL_CALENDAR_URL }}
      # Direct Upload — does NOT count against Cloudflare's 500-builds/month
      # cap, since that only applies to Cloudflare's own Git-integration
      # builds. Our own build step above is the build; this just ships the
      # already-built dist/ folder.
      - uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Update this if the Cloudflare Pages project is named differently.
          projectName: naprey
          directory: dist
